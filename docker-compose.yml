name: desafio-hubfy

services:
  db:
    image: mysql:8.4
    container_name: desafio_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: desafio
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: desafio_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://root:root@db:3306/desafio"
      DATABASE_HOST: "db"
      DATABASE_PORT: "3306"
      DATABASE_USER: "root"
      DATABASE_PASSWORD: "root"
      DATABASE_NAME: "desafio"
      JWT_SECRET: "sua_chave_secreta"
      NODE_ENV: "production"
    ports:
      - "3000:3000"

volumes:
  mysql_data: